meta:
  id: savage-worlds-swade
  name: Savage Worlds Adventure Edition
  publisher: Pinnacle Entertainment Group
  version: swade
  engine: savage-worlds
  tags: [fantasy, sci-fi, horror, universal]

terminology:
  attributes: Traits
  skills: Skills
  positive_traits: Edges
  negative_traits: Hindrances
  traits: Edges & Hindrances
  character_points: Advances

mechanics:
  dice: [4, 6, 8, 10, 12]
  roll_type: step
  wild_die: 6

attributes:
  agility:  { label: Agility,   die: 6 }
  smarts:   { label: Smarts,    die: 6 }
  spirit:   { label: Spirit,    die: 6 }
  strength: { label: Strength,  die: 6 }
  vigor:    { label: Vigor,     die: 6 }

skills:
  athletics:        { label: Athletics,         attribute: agility }
  common_knowledge: { label: Common Knowledge,  attribute: smarts }
  fighting:         { label: Fighting,          attribute: agility }
  notice:           { label: Notice,            attribute: smarts }
  persuasion:       { label: Persuasion,        attribute: spirit }
  shooting:         { label: Shooting,          attribute: agility }
  stealth:          { label: Stealth,           attribute: agility }
  survival:         { label: Survival,          attribute: smarts }

character:
  creation:
    attribute_points: 5
    skill_points: 15
    starting_advances: 0
    hindrance_points_minor: 1
    hindrance_points_major: 2
  derived:
    pace:      { label: Pace,      formula: "6" }
    parry:     { label: Parry,     formula: "2 + floor(fighting_die / 2)" }
    toughness: { label: Toughness, formula: "2 + floor(vigor_die / 2)" }

resources:
  bennies: { label: Bennies, default: 3 }
  wounds:  { label: Wounds,  min: 0, max: 3 }

traits:
  # Positive traits (edges)
  alertness:
    label: Alertness
    category: background
    polarity: positive
    requirements:
      - { type: skill, id: notice, min_die: 6 }
    effects:
      - { type: bonus, target: notice, value: 2 }
    description: The character is unusually alert and hard to surprise.
  ambidextrous:
    label: Ambidextrous
    category: background
    polarity: positive
    requirements:
      - { type: attribute, id: agility, min_die: 8 }
    description: Ignores the off-hand penalty.
  block:
    label: Block
    category: combat
    polarity: positive
    requirements:
      - { type: skill, id: fighting, min_die: 8 }
    effects:
      - { type: bonus, target: parry, value: 1 }
    description: +1 Parry.
  # Negative traits (hindrances)
  all_thumbs:
    label: All Thumbs
    category: background
    polarity: negative
    severity: minor
    effects:
      - { type: penalty, target: repair, value: -2 }
    description: -2 to Repair rolls. On a Critical Failure with tech, it breaks.
  arrogant:
    label: Arrogant
    category: background
    polarity: negative
    severity: major
    description: Must challenge the most powerful foe present.
  bad_luck:
    label: Bad Luck
    category: background
    polarity: negative
    severity: major
    effects:
      - { type: replace, target: bennies, value: 2 }
    description: One fewer Benny per session.
